# ============================================
# AI-food 部署编排（开发/演示环境）
# - MySQL 8.0：数据持久化
# - Redis 7：缓存 / 点赞 Lua / 布隆过滤器
# - Backend：Spring Boot 3.4（端口 8080）
# - Frontend：Vue 3 + Vite 静态构建（端口 3000）
# ============================================

services:
  mysql:
    image: mysql:8.0
    container_name: aifood-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_food}
      MYSQL_USER: ${MYSQL_USER:-aifood}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-aifood123}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - aifood-net

  redis:
    image: redis:7-alpine
    container_name: aifood-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - aifood-net

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: aifood-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Spring Datasource
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-ai_food}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-aifood}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-aifood123}
      # Spring Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # Spring AI / DeepSeek
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-your-deepseek-api-key-here}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      # JWT（覆盖 application.yml 默认值）
      JWT_SECRET: ${JWT_SECRET:-YWktZm9vZC1kZXYtc2VjcmV0LXBsZWFzZS1yb3RhdGUtaW4tcHJvZA==}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-604800000}
      # 文件上传（容器内路径）
      APP_UPLOAD_BASE_URL: /uploads
      APP_UPLOAD_DIR: /app/uploads
      # JVM
      JAVA_OPTS: -Xms256m -Xmx768m
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "8080:8080"
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    # [L15] 资源硬上限：4GB host 容量下防止单容器吃光内存拖死 mysql/redis
    # mem_limit == memswap_limit 禁 swap（JVM 在 swap 上会显著拖慢 GC）
    mem_limit: 768m
    memswap_limit: 768m
    cpus: '1.0'
    networks:
      - aifood-net

  frontend:
    image: nginx:1.27-alpine
    container_name: aifood-frontend
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    networks:
      - aifood-net

volumes:
  mysql_data:
  redis_data:
  backend_uploads:
  backend_logs:

networks:
  aifood-net:
    driver: bridge
