# ============================================
# AI-food 部署编排（生产级 - test=prod on this 4GB sandbox）
# - MySQL：远程服务器（cloud 127.0.0.1:3306，sandbox 通过 ssh tunnel 暴露 13306）
# - Redis：本地容器
# - Backend：Spring Boot 3.4（端口 8080，profile=prod，单 stage Dockerfile，HOST NETWORK）
# - Frontend：Vue 3 + Vite 静态构建（端口 3000）
# ============================================

services:
  redis:
    image: redis:7-alpine
    container_name: aifood-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    # [L15] 资源硬上限：4GB host 容量下防止单容器吃光内存拖死 redis/backend
    mem_limit: 128m
    memswap_limit: 128m
    cpus: '0.5'
    # [PHS-6] 日志上限
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - aifood-net

  # Backend 用 host 网络：直接看到 sandbox loopback，
  # SSH 隧道绑 127.0.0.1:13306 即可被 backend 直连（无需 host.docker.internal 路由）
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.simple
    image: aifood-backend:simple
    container_name: aifood-backend
    restart: unless-stopped
    network_mode: host
    depends_on:
      redis:
        condition: service_healthy
    environment:
      # Spring profile = prod（覆盖 application.yml 默认 dev）
      SPRING_PROFILES_ACTIVE: prod

      # MySQL：本地 loopback（sandbox 通过 ssh -L 13306→cloud:3306 暴露）
      SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:${MYSQL_PORT:-13306}/${MYSQL_DATABASE:-ai_food}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-aifood}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-aifood123}

      # Redis：本地 loopback（host network 模式下 redis 端口直接可见）
      SPRING_DATA_REDIS_HOST: 127.0.0.1
      SPRING_DATA_REDIS_PORT: 6379

      # Spring AI / DeepSeek（user 授权使用现有 key）
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}

      # Mail 占位（EmailService @Value 强依赖；test=prod 不发邮件，仅让 JavaMailSender bean 装配成功）
      # 真发送会因没有 SMTP server 失败 — 这是预期（注册验证码是 dev-only 功能）
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-disabled.invalid}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-25}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-noreply@aifood.local}

      # [PHS-3] Knife4j production+basic.enable 让它自己强制 basic auth（响应头 WWW-Authenticate: Basic realm="input Swagger..."）
      # 这次 test=prod 不需要 basic auth 双层关卡；正式 prod 应该用 proper auth (OAuth2/SAML) 代替
      KNIFE4J_PRODUCTION: "false"
      KNIFE4J_BASIC_ENABLE: "false"

      # [PHS-4] spring.mail.host=disabled 占位让 JavaMailSender bean 装配，但 MailHealthIndicator 会探测 SMTP 失败
      # 把 mail / livenessState / readinessState 关掉让 /actuator/health 转 UP
      MANAGEMENT_HEALTH_MAIL_ENABLED: "false"
      MANAGEMENT_HEALTH_DISK_ENABLED: "false"
      MANAGEMENT_HEALTH_LIVENESSSTATE_ENABLED: "false"
      MANAGEMENT_HEALTH_READINESSSTATE_ENABLED: "false"

      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-604800000}

      # 文件上传
      APP_UPLOAD_BASE_URL: /uploads
      APP_UPLOAD_DIR: /app/uploads

      # [PHS-1] JVM 容器感知 — 不写死 -Xmx,让 JVM 按容器内存自动算 75%
      # 写死 -Xmx512m 在 32GB 主机上直接 OOMKill
      JAVA_OPTS: -XX:MaxRAMPercentage=75.0 -XX:MinRAMPercentage=50.0 -XX:+UseContainerSupport -XX:+ExitOnOutOfMemoryError
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    # [L15] 资源硬上限：4GB host 容量下防止单容器吃光内存
    mem_limit: 768m
    memswap_limit: 768m
    cpus: '1.0'
    # [PHS-3] 配合 server.shutdown=graceful,给 in-flight 请求 30s 收尾窗口
    stop_grace_period: 30s
    # [PHS-6] 单服务日志上限 10m*3=30MB,4 服务总 120MB,云盘 50GB 不会被打爆
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: nginx:1.27-alpine
    container_name: aifood-frontend
    restart: unless-stopped
    depends_on:
      - backend
    # [PHS-2] 切 host network：直接暴露 :3000，不走 docker bridge；
    # nginx 容器内 127.0.0.1 = sandbox 主机 loopback（backend 也在那里 :8080）
    network_mode: host
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    mem_limit: 64m
    memswap_limit: 64m
    # [PHS-6] 日志上限
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============ Admin 管理后台 ============
  admin-server:
    build: ./backend/admin-server
    container_name: aifood-admin-server
    restart: unless-stopped
    network_mode: host
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # 本地模式通过 SSH 隧道访问 cloud MySQL (127.0.0.1:13306 → cloud:3306)
      SPRING_DATASOURCE_URL: ${ADMIN_DB_URL:-jdbc:mysql://127.0.0.1:13306/ai_food?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-aifood}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-aifood123}
      SPRING_DATA_REDIS_HOST: 127.0.0.1
      SPRING_DATA_REDIS_PORT: "6379"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-604800000}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-test}
      SBA_USER: ${SBA_USER:-admin}
      SBA_PASSWORD: ${SBA_PASSWORD:-admin123}
      DRUID_USER: ${DRUID_USER:-admin}
      DRUID_PASSWORD: ${DRUID_PASSWORD:-admin123}
      JAVA_OPTS: -XX:MaxRAMPercentage=75.0 -XX:+UseContainerSupport
    mem_limit: 512m
    memswap_limit: 512m
    cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  admin-web:
    build: ./frontend/admin-web
    container_name: aifood-admin-web
    restart: unless-stopped
    depends_on:
      - admin-server
    network_mode: host
    mem_limit: 64m
    memswap_limit: 64m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis_data:
  backend_uploads:
  backend_logs:

networks:
  aifood-net:
    driver: bridge
