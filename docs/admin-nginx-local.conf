# AI-food Admin 本地 nginx 配置
# 监听 :80,统一入口分发到本地 vite preview(:5174)和 admin-server(:8081)
#
# 适用场景:本机或 sandbox 内网已有 nginx,想一个域名/端口管多个前端
#
# 启用:
#   1. cp admin-frontend.conf /etc/nginx/sites-enabled/admin
#   2. sudo nginx -t && sudo systemctl reload nginx
#   3. sudo ufw allow 80/tcp   # 如开了防火墙
#
# DNS:  本机 hosts 加 admin.local 127.0.0.1
#       或内网 DNS:admin.example.com → 10.1.0.17
server {
    listen 80;
    listen [::]:80;
    server_name admin.local _;  # 改成你的域名

    access_log /var/log/nginx/admin-access.log;
    error_log  /var/log/nginx/admin-error.log warn;

    # ponytail: favicon 兜底
    location = /favicon.ico { return 204; }

    # 后端 API
    location /admin/api/ {
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
    }

    # Spring Boot Admin UI（基本认证）
    location /admin/sba/ {
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # Druid SQL 监控
    location /admin/druid/ {
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # 健康检查（公开）
    location /health {
        proxy_pass http://127.0.0.1:8081/actuator/health;
        access_log off;
    }

    # admin-web SPA（注意:上面 /admin/api/ /admin/sba/ /admin/druid/ 必须在前!)
    location / {
        proxy_pass         http://127.0.0.1:5174;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # SPA fallback: 不存在的路径交给 vite preview 的 history fallback
        # 如果 vite preview 不支持,改用 try_files $uri $uri/ /index.html;
    }
}