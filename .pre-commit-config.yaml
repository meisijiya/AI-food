# ============================================
# pre-commit 框架配置
# 安装：pip install pre-commit
# 启用：pre-commit install
# 手动跑：pre-commit run --all-files
# ============================================

# 不需要所有 hook 都跑，只跑本仓库需要的
default_install_hook_types: [pre-commit, commit-msg]
default_stages: [pre-commit]

# 跳过的目录
exclude: |
  (?x)^(
    .*\.min\.(js|css)|
    docs/screenshots/.*|
    .*\.lock
  )$

repos:
  # ---------- 本地 hook：敏感信息扫描 ----------
  - repo: local
    hooks:
      - id: check-secrets
        name: 🔐 敏感信息扫描
        description: 扫 .env 权限、gitignore 覆盖、staged 文件中的 key/token
        entry: bash scripts/check-secrets.sh --staged
        language: system
        stages: [pre-commit]
        # 总是跑（包括没有 staged 文件时也跑步骤 1 的 .env 检查）
        always_run: true
        pass_filenames: false

  # ---------- 公开 hook：标准格式化 ----------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
        exclude: '\.md$'
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: detect-private-key
        # 替代兜底 regex，更准
      - id: check-yaml
      - id: check-json
