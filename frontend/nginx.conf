# Frontend (Vue 3 + Vite) served by nginx
# SPA 路由：所有未匹配路径回退到 index.html

server {
    # [PHS-2] host network 下 listen 直接绑到 host 端口；用户公开 3000 到外网
    listen       3000;
    server_name  localhost;

    # 字符集
    charset utf-8;

    # 根目录（Vite 构建产物）
    root   /usr/share/nginx/html;
    index  index.html index.htm;

    # gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 长缓存静态资源
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 不缓存 index.html（确保部署后立即生效）
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # 后端 API 代理
    # [PHS-2] backend 切 host network 后没有 'backend' DNS 名，改用 127.0.0.1:8080
    # frontend 也是 host network，所以容器内 127.0.0.1 就是 sandbox 主机
    location /api/ {
        proxy_pass         http://127.0.0.1:8080/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # WebSocket 代理
    location /ws/ {
        proxy_pass         http://127.0.0.1:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_read_timeout  3600s;
    }

    # SPA 路由 fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 健康检查端点（用于 docker compose healthcheck）
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
