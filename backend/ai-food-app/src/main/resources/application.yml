# ============================================
# AI-food 后端通用配置
# 任何 profile 都会加载
# ============================================

spring:
  application:
    name: ai-food
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # [L11] Graceful shutdown — 给 WebSocket / in-flight 请求一个收尾窗口
  lifecycle:
    timeout-per-shutdown-phase: 30s

  # Jackson
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # Servlet 上传文件大小
  # [PHS-5] 100MB 单次上传会吃光 768MB 容器内存,改 10MB
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # [PHS-3] 防止 controller 渲染时仍持 DB 连接导致泄漏
  jpa:
    open-in-view: false

  # Spring DataSource（由 profile 覆盖）
  # [PHS-1] HikariCP 配置 — 50 连接在 768MB 容器下是定时炸弹
  # 公式:(cores * 2) + spindles,1.7GB cloud MySQL 单实例保守 15
  datasource:
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      connection-timeout: 5000      # 默认 30s 太长,pool 耗尽时阻塞
      leak-detection-threshold: 10000  # staging 5s,prod 30s;触发会打印堆栈
      max-lifetime: 1800000          # 30min,小于 MySQL wait_timeout
      idle-timeout: 600000           # 10min
      pool-name: aifood-hikari
  # Spring Data Redis（由 profile 覆盖）

# ============================================
# MyBatis-Plus 全局配置
# ============================================
mybatis-plus:
  configuration:
    # 驼峰命名映射下划线字段（实体 createdAt -> 表 created_at）
    map-underscore-to-camel-case: true
    # 日志实现：默认 stdout，生产可通过配置切换
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
    # 缓存开关（生产可调优）
    cache-enabled: false
  global-config:
    banner: false
    db-config:
      # 主键策略：ASSIGN_ID 雪花算法（Long 类型 ID）
      id-type: ASSIGN_ID
      # 软删除字段：实体中 isDeleted 字段映射 is_deleted 列
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      # 乐观锁字段：实体中 version 字段
      version-field: version
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.ai.food.model

# 文件上传路径（容器内）
app:
  upload:
    base-url: ${APP_UPLOAD_BASE_URL:/uploads}
    dir: ${APP_UPLOAD_DIR:./uploads}
  # [L17] CORS 白名单走 env 注入；生产域名通过 APP_CORS_ALLOWED_ORIGINS 覆盖
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

# ================== JWT ==================
# 开发默认值：base64('ai-food-dev-secret-please-rotate-in-prod')
# 生产必须通过 JWT_SECRET 环境变量覆盖（建议 ≥ 32 字节随机 + base64）
jwt:
  secret: ${JWT_SECRET:YWktZm9vZC1kZXYtc2VjcmV0LXBsZWFzZS1yb3RhdGUtaW4tcHJvZA==}
  expiration: ${JWT_EXPIRATION:604800000}  # 7 天（毫秒）

# Spring AI / DeepSeek 配置
spring.ai.openai:
  api-key: ${DEEPSEEK_API_KEY:your-deepseek-api-key-here}
  base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
  chat:
    options:
      model: ${DEEPSEEK_MODEL:deepseek-chat}
      temperature: 0.7

# ================== 服务端口 ==================
server:
  port: 8080
  # [L11] graceful: deploy 时先停接收新连接、让 in-flight（WebSocket 推送等）跑完再退出
  shutdown: graceful
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,text/html,text/xml,text/plain
  tomcat:
    # [PHS-1] 200 线程在 768MB 容器下是定时炸弹 — 200 thread stack ≈ 200MB,
    # 留 100MB 给 heap,实际可用 < 512MB。降到 50
    threads:
      max: 50

# ================== Springdoc / Knife4j ==================
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  default-flat-param-object: true
  show-actuator: false
  group-configs:
    # group 名 (key for springdoc) 不能跟 springdoc 自动生成的默认组重名
    - group: all-apis
      paths-to-match: /api/**
      display-name: 0-所有接口

knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-version: true
    enable-swagger-models: true
    swagger-model-name: 实体类列表
    enable-custom-code: false
  basic:
    enable: false  # 生产环境可以打开 basic auth
  production: false
  display-custom: |
    <div style="text-align: center; padding: 20px;">
      <h1>AI 美食推荐应用 API 文档</h1>
      <p>基于 Spring Boot 3.4 + Spring AI 1.0.0-M6 + DeepSeek</p>
      <p>
        <a href="https://github.com/meisijiya/AI-food" target="_blank">GitHub 仓库</a> |
        <a href="/actuator/health" target="_blank">健康检查</a>
      </p>
    </div>

# ================== Actuator（健康检查） ==================
management:
  endpoints:
    web:
      exposure:
        # [L16] prometheus 加入白名单；当前 /actuator/prometheus 仍 404（缺 micrometer-registry-prometheus 依赖），
        # 依赖加进 pom 后端点自动可用。依赖添加暂列 backlog，本次不引入。
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    redis:
      enabled: true
    db:
      enabled: true
    defaults:
      enabled: true

# ================== Logging ==================
logging:
  level:
    # [PHS-6] 生产关闭 DEBUG — DEBUG 日志每条带完整 SQL + 变量,768MB 容器扛不住
    root: INFO
    com.ai.food: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  file:
    name: ${LOG_PATH:/app/logs}/ai-food.log
    max-size: 50MB
    max-history: 30
