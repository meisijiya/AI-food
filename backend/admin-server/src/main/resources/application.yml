server:
  port: 8081
  shutdown: graceful

spring:
  application:
    name: admin-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  security:
    user:
      name: ${SBA_USER:admin}
      password: ${SBA_PASSWORD:admin123}
      roles: ADMIN

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ai_food?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${DB_USER:aifood}
    password: ${DB_PASSWORD:aifood123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    banner: false
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.ai.food.common.model

jwt:
  secret: ${JWT_SECRET:YWktZm9vZC1kZXYtc2VjcmV0LXBsZWFzZS1yb3RhdGUtaW4tcHJvZA==}
  expiration: ${JWT_EXPIRATION:604800000}

spring.boot.admin:
  context-path: /admin/sba
  ui:
    title: AI-Food Admin Monitor

spring.datasource.druid:
  stat-view-servlet:
    enabled: true
    url-pattern: /admin/druid/*
    login-username: ${DRUID_USER:admin}
    login-password: ${DRUID_PASSWORD:admin123}
    allow:
  web-stat-filter:
    enabled: true
    url-pattern: /*
    exclusions: '*.js,*.gif,*.jpg,*.png,*.css,*.ico,/admin/druid/*'

management:
  endpoints:
    web:
      # ponytail: 只暴露 health(公开 ping)+ info。不开 env/metrics/loggers(会泄露密钥/内部指标)
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      # 不向未认证用户显示 components 详情(防信息泄露:数据库类型/磁盘容量/Redis 版本)
      show-details: when_authorized
      probes:
        enabled: true
  info:
    env:
      enabled: false

logging:
  level:
    root: INFO
    com.aifood: INFO
    com.ai.food: INFO
